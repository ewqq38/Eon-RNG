<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05050f;font-family:'Inter',sans-serif;color:#e2e8f0}

/* ── Mount animations ── */
@keyframes popIn   {0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes rarePop {0%{transform:scale(0.4);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes megaPop {0%{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}

/* ── Badge glow animations ── */
@keyframes glowEpic  {0%,100%{box-shadow:0 0 6px rgba(192,132,252,.5)}50%{box-shadow:0 0 16px rgba(192,132,252,.95)}}
@keyframes glowLeg   {0%,100%{box-shadow:0 0 8px rgba(251,191,36,.6)}50%{box-shadow:0 0 22px rgba(251,191,36,1),0 0 40px rgba(251,191,36,.4)}}
@keyframes glowMyth  {0%,100%{box-shadow:0 0 10px rgba(249,115,22,.7)}50%{box-shadow:0 0 26px rgba(249,115,22,1),0 0 50px rgba(249,115,22,.4)}}
@keyframes glowDiv   {0%,100%{box-shadow:0 0 12px rgba(232,121,249,.7)}50%{box-shadow:0 0 30px rgba(232,121,249,1),0 0 60px rgba(232,121,249,.5)}}
@keyframes glowCos   {0%,100%{box-shadow:0 0 14px rgba(34,211,238,.7)}50%{box-shadow:0 0 34px rgba(34,211,238,1),0 0 70px rgba(34,211,238,.5)}}
@keyframes glowCel   {0%,100%{box-shadow:0 0 16px rgba(254,240,138,.8)}50%{box-shadow:0 0 38px rgba(254,240,138,1),0 0 80px rgba(254,240,138,.6)}}
@keyframes glowTrans {0%,100%{box-shadow:0 0 18px rgba(226,232,240,.8),0 0 35px rgba(226,232,240,.3)}50%{box-shadow:0 0 40px #fff,0 0 80px rgba(226,232,240,.6)}}
@keyframes glowPrim  {0%,100%{box-shadow:0 0 20px rgba(251,146,60,.9)}50%{box-shadow:0 0 45px rgba(251,146,60,1),0 0 90px rgba(251,146,60,.5)}}
@keyframes glowAbyss {0%,100%{box-shadow:0 0 20px rgba(220,38,38,.9)}50%{box-shadow:0 0 45px rgba(220,38,38,1),0 0 90px rgba(220,38,38,.4)}}
@keyframes glowEtern {0%,100%{box-shadow:0 0 22px rgba(129,140,248,.9)}50%{box-shadow:0 0 50px rgba(129,140,248,1),0 0 100px rgba(129,140,248,.5)}}
@keyframes glowOmega {0%,100%{box-shadow:0 0 25px rgba(255,255,255,.9)}50%{box-shadow:0 0 60px #fff,0 0 120px rgba(255,255,255,.6)}}
@keyframes glowSec   {0%{box-shadow:0 0 18px rgba(99,102,241,.9)}50%{box-shadow:0 0 35px rgba(139,92,246,1),0 0 70px rgba(99,102,241,.5)}100%{box-shadow:0 0 18px rgba(99,102,241,.9)}}
@keyframes glitchA   {0%{transform:none;filter:none;box-shadow:0 0 22px rgba(236,72,153,.9)}25%{transform:translateX(3px) skewX(2deg);filter:hue-rotate(90deg);box-shadow:0 0 40px rgba(236,72,153,1)}50%{transform:translateX(-2px);filter:hue-rotate(180deg);box-shadow:0 0 50px rgba(139,92,246,1)}75%{transform:translateX(2px);filter:hue-rotate(270deg);box-shadow:0 0 40px rgba(34,211,238,1)}100%{transform:none;filter:none}}
@keyframes voidA     {0%,100%{filter:brightness(1) saturate(.2);box-shadow:0 0 12px rgba(71,85,105,.8)}50%{filter:brightness(.4) saturate(0) invert(.05);box-shadow:0 0 30px rgba(30,41,59,1)}}
@keyframes rainbowI  {0%{box-shadow:0 0 28px #ff006e,0 0 56px #ff006e40}17%{box-shadow:0 0 28px #f97316,0 0 56px #f9731640}34%{box-shadow:0 0 28px #fbbf24,0 0 56px #fbbf2440}50%{box-shadow:0 0 28px #4ade80,0 0 56px #4ade8040}67%{box-shadow:0 0 28px #60a5fa,0 0 56px #60a5fa40}84%{box-shadow:0 0 28px #c084fc,0 0 56px #c084fc40}100%{box-shadow:0 0 28px #ff006e,0 0 56px #ff006e40}}

.b-common      {animation:popIn .2s ease-out}
.b-rare        {animation:popIn .25s ease-out}
.b-epic        {animation:popIn .3s ease-out,glowEpic 2.5s ease-in-out .3s infinite}
.b-legendary   {animation:rarePop .35s ease-out,glowLeg 2s ease-in-out .35s infinite}
.b-mythic      {animation:rarePop .4s ease-out,glowMyth 1.8s ease-in-out .4s infinite}
.b-divine      {animation:rarePop .4s ease-out,glowDiv 1.7s ease-in-out .4s infinite}
.b-cosmic      {animation:rarePop .4s ease-out,glowCos 1.6s ease-in-out .4s infinite}
.b-celestial   {animation:megaPop .45s ease-out,glowCel 1.5s ease-in-out .45s infinite}
.b-transcendent{animation:megaPop .5s ease-out,glowTrans 1.4s ease-in-out .5s infinite}
.b-primordial  {animation:megaPop .5s ease-out,glowPrim 1.3s ease-in-out .5s infinite}
.b-abyssal     {animation:megaPop .5s ease-out,glowAbyss 1.2s ease-in-out .5s infinite}
.b-eternal     {animation:megaPop .55s ease-out,glowEtern 1.2s ease-in-out .55s infinite}
.b-omega       {animation:megaPop .6s ease-out,glowOmega 1s ease-in-out .6s infinite}
.b-secret      {animation:megaPop .5s ease-out,glowSec 2s linear .5s infinite}
.b-ultrasecret {animation:megaPop .5s ease-out,glitchA .5s steps(3) .5s infinite}
.b-null        {animation:megaPop .5s ease-out,voidA 3s ease-in-out .5s infinite}
.b-impossible  {animation:megaPop .6s ease-out,rainbowI 2s linear .6s infinite}

/* ── UI animations ── */

@keyframes rollPulse   {0%,100%{box-shadow:0 0 20px rgba(124,58,237,.6),0 4px 24px rgba(124,58,237,.3)}50%{box-shadow:0 0 50px rgba(167,139,250,.95),0 4px 40px rgba(124,58,237,.6)}}

@keyframes titleTechy  {0%,100%{text-shadow:0 0 30px rgba(0,255,65,.4)}50%{text-shadow:0 0 70px rgba(0,255,65,.9)}}

@keyframes notifAnim   {0%{opacity:0;transform:translateX(-50%) translateY(-14px)}12%,88%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-14px)}}
@keyframes flashFade   {0%{opacity:.72}100%{opacity:0}}
@keyframes spinIcon    {from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes slotFlick   {0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fireDrift   {0%{transform:translateY(0) scale(1);opacity:.7}100%{transform:translateY(-80px) scale(0);opacity:0}}
@keyframes matrixFall  {0%{transform:translateY(-20px);opacity:1}100%{transform:translateY(100px);opacity:0}}
@keyframes trainMove   {0%{transform:translateX(-10%)}100%{transform:translateX(110%)}}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:#05050f}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
input{outline:none;font-family:inherit}
button{font-family:inherit;cursor:pointer;transition:all .15s}
button:active:not(:disabled){transform:scale(.96)}
button:disabled{cursor:not-allowed}

function rollAura(luck){
  const adj={};let tot=0;
  RK.forEach(k=>{
    const w=RARITY[k].weight;
    if(w<=0)return;
    const p=k==="common"?w:w*luck;
    adj[k]=p;tot+=p;
  });
  let r=Math.random()*tot;
  for(const k of RK){
    if(!adj[k])continue;
    r-=adj[k];
    if(r<=0){const pool=AURAS.filter(a=>a.rarity===k&&!a.theme);return pool[Math.floor(Math.random()*pool.length)];}
  }
  return AURAS[0];
}
function fmt(n){
  if(n>=1e12)return(n/1e12).toFixed(1)+"T";
  if(n>=1e9) return(n/1e9).toFixed(1)+"B";
  if(n>=1e6) return(n/1e6).toFixed(1)+"M";
  if(n>=1e3) return(n/1e3).toFixed(1)+"K";
  return n.toLocaleString();
}

function App(){
  const [coins,setCoins]           =useState(0);
  const [rolls,setRolls]           =useState(0);
  const [luck,setLuck]             =useState(1.0);
  const [speedLvl,setSpeedLvl]     =useState(1);
  const [equipped,setEquipped]     =useState(null);
  const [lastRoll,setLastRoll]     =useState(null);
  const [history,setHistory]       =useState([]);
  const [collection,setCollection] =useState({});
  const [auto,setAuto]             =useState(false);
  const [shopOpen,setShopOpen]     =useState(false);
  const [collOpen,setCollOpen]     =useState(false);
  const [codeInput,setCodeInput]   =useState("");
  const [usedCodes,setUsedCodes]   =useState(new Set());
  const [notif,setNotif]           =useState(null);
  const [rolling,setRolling]       =useState(false);
  const [slotAura,setSlotAura]     =useState(null);
  const [flash,setFlash]           =useState(null);

  // Determine active theme from equipped aura
  const activeThemeKey=equipped?.theme??"default";
  const th=THEMES[activeThemeKey];

  const luckRef=useRef(luck);
  const fastRef=useRef(null);
  const slowRef=useRef(null);
  const slowTm =useRef(null);
  useEffect(()=>{luckRef.current=luck;},[luck]);

  // Apply body background per theme
  useEffect(()=>{document.body.style.background=th.bodyBg;},[th]);

  useEffect(()=>{
    if(!rolling){setSlotAura(null);return;}
    fastRef.current=setInterval(()=>setSlotAura(AURAS.filter(a=>!a.theme)[Math.floor(Math.random()*AURAS.filter(a=>!a.theme).length)]),65);
    slowTm.current=setTimeout(()=>{
      clearInterval(fastRef.current);
      slowRef.current=setInterval(()=>setSlotAura(AURAS.filter(a=>!a.theme)[Math.floor(Math.random()*AURAS.filter(a=>!a.theme).length)]),210);
    },900);
    return()=>{clearInterval(fastRef.current);clearInterval(slowRef.current);clearTimeout(slowTm.current);};
  },[rolling]);

  function showNotif(msg){setNotif(msg);setTimeout(()=>setNotif(null),2800);}

  function applyRoll(aura){
    const r=RARITY[aura.rarity];
    setCoins(c=>c+r.coins);
    setRolls(n=>n+1);
    setLastRoll(aura);
    setHistory(h=>[aura,...h].slice(0,120));
    setCollection(prev=>({...prev,[aura.id]:(prev[aura.id]||0)+1}));
    return r;
  }

  function handleRoll(){
    if(rolling)return;
    setRolling(true);
    setTimeout(()=>{
      const aura=rollAura(luckRef.current);
      const r=applyRoll(aura);
      if(r.ord>=5){setFlash(r.color);setTimeout(()=>setFlash(null),r.ord>=10?1000:650);}
      setRolling(false);
      if(r.ord>=7)showNotif(`${aura.icon} ${aura.name} — ${r.label.toUpperCase()}! +${fmt(r.coins)} coins`);
    },1300);
  }

  useEffect(()=>{
    if(!auto)return;
    const ms=SPEED_MS[speedLvl-1];
    const id=setInterval(()=>{
      const aura=rollAura(luckRef.current);
      const r=applyRoll(aura);
      if(r.ord>=10){setFlash(r.color);setTimeout(()=>setFlash(null),500);showNotif(`${aura.icon} ${aura.name} — ${r.label.toUpperCase()}!`);}
    },ms);
    return()=>clearInterval(id);
  },[auto,speedLvl]); // eslint-disable-line

  function buyLuck(item){
    if(coins<item.cost){showNotif("Not enough coins!");return;}
    setCoins(c=>c-item.cost);
    setLuck(l=>parseFloat((l+item.boost).toFixed(2)));
    showNotif(`${item.label} applied! ✨`);
  }
  function buySpeed(item){
    if(speedLvl>=item.level)return;
    if(coins<item.cost){showNotif("Not enough coins!");return;}
    setCoins(c=>c-item.cost);
    setSpeedLvl(item.level);
    showNotif(`Speed upgraded to Lv.${item.level}!`);
  }
  function redeem(){
    const code=codeInput.trim().toUpperCase();
    if(!code)return;
    if(usedCodes.has(code)){showNotif("Code already used!");return;}
    const reward=ALL_CODES[code];
    if(!reward){showNotif("❌ Invalid code!");return;}
    if(reward.coins)setCoins(c=>c+reward.coins);
    if(reward.luck)setLuck(l=>parseFloat((l+reward.luck).toFixed(2)));
    if(reward.aura){
      const aura=AURAS.find(a=>a.id===reward.aura);
      if(aura){
        setCollection(prev=>({...prev,[aura.id]:(prev[aura.id]||0)+1}));
        showNotif(reward.msg);
      }
    }else showNotif(reward.msg);
    setUsedCodes(prev=>new Set([...prev,code]));
    setCodeInput("");
  }

  const card={background:th.cardBg,border:`1px solid ${th.cardBorder}`,borderRadius:"10px",padding:"14px"};
  const lastR=lastRoll?RARITY[lastRoll.rarity]:null;
  const slotR=slotAura?RARITY[slotAura.rarity]:null;
  const isTechy=activeThemeKey==="techy";

  return(
    <div style={{minHeight:"100vh",fontFamily:th.font,position:"relative",zIndex:1}}>

      {/* Themed backgrounds */}
      {activeThemeKey==="tokyo"    && <TokyoBg/>}
      {activeThemeKey==="infernal" && <InfernalBg/>}
      {activeThemeKey==="techy"    && <TechyBg/>}

      {/* Flash */}
      {flash&&<div style={{position:"fixed",inset:0,zIndex:999,background:flash,pointerEvents:"none",animation:"flashFade .9s ease-out forwards"}}/>}
      {/* Notif */}
      {notif&&<div style={{position:"fixed",top:"18px",left:"50%",zIndex:998,background:"rgba(10,10,28,.97)",border:"1px solid rgba(255,255,255,.12)",borderRadius:"20px",padding:"8px 20px",fontSize:"12px",color:"#e2e8f0",whiteSpace:"nowrap",animation:"notifAnim 2.8s ease forwards",backdropFilter:"blur(10px)",pointerEvents:"none",fontFamily:th.font}}>{notif}</div>}
      {collOpen&&<CollectionModal collection={collection} onClose={()=>setCollOpen(false)} th={th}/>}

      {/* Title */}
      <div style={{textAlign:"center",paddingTop:"28px",paddingBottom:"14px",position:"relative",zIndex:1}}>
        <h1 style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(28px,7vw,50px)",fontWeight:900,letterSpacing:"8px",background:th.titleGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",animation:th.titleAnim}}>
          {th.titleText}
        </h1>
        <p style={{color:th.muted,fontSize:"10px",letterSpacing:isTechy?"2px":"5px",marginTop:"5px",fontFamily:th.font}}>
          {th.subText??`${AURAS.length} AURAS · ${RK.length} RARITIES`}
        </p>
        {th.subText&&<p style={{color:th.muted,fontSize:"9px",letterSpacing:"2px",marginTop:"3px",opacity:.6}}>{AURAS.length} AURAS · {RK.length} RARITIES</p>}
      </div>

      {/* Stats */}
      <div style={{display:"flex",justifyContent:"center",gap:"7px",flexWrap:"wrap",padding:"0 14px 16px",position:"relative",zIndex:1}}>
        {[{label:isTechy?"COINS >":"Coins",val:`${fmt(coins)} 💰`},{label:isTechy?"ROLLS >":"Rolls",val:rolls.toLocaleString()},{label:isTechy?"LUCK >":"Luck",val:`×${luck.toFixed(2)}`},{label:isTechy?"SPD >":"Speed",val:`Lv.${speedLvl}`}].map(s=>(
          <div key={s.label} style={{background:th.statBg,border:`1px solid ${th.statBorder}`,borderRadius:"8px",padding:"6px 14px",display:"flex",gap:"8px",alignItems:"baseline"}}>
            <span style={{color:th.muted,fontSize:"9.5px",letterSpacing:"1px"}}>{s.label}</span>
            <span style={{color:th.accent==="default"?"#e2e8f0":th.accent,fontSize:"13px",fontWeight:500}}>{s.val}</span>
          </div>
        ))}
      </div>

      {/* Content */}
      <div style={{maxWidth:"680px",margin:"0 auto",padding:"0 14px 40px",display:"flex",flexDirection:"column",gap:"9px",position:"relative",zIndex:1}}>

        {/* Equipped */}
        <div style={card}>
          <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"}}>
            <span style={{color:th.accent}}>⚡</span>
            <span style={{fontFamily:th.font,fontSize:"9px",letterSpacing:"3px",color:th.muted}}>EQUIPPED AURA</span>
          </div>
          <AuraDisplay aura={equipped} onUnequip={()=>setEquipped(null)} theme={activeThemeKey}/>
          {lastRoll&&lastRoll.id!==equipped?.id&&!rolling&&(
            <button onClick={()=>setEquipped(lastRoll)} style={{marginTop:"9px",width:"100%",padding:"9px",background:`${lastR?.color??"#818cf8"}14`,border:`1px solid ${lastR?.color??"#818cf8"}40`,borderRadius:"8px",color:lastR?.color??"#818cf8",fontFamily:th.font,fontSize:"9.5px",letterSpacing:"2px",display:"flex",alignItems:"center",justifyContent:"center",gap:"7px"}}>
              ⚡ EQUIP — {lastRoll.icon} {lastRoll.name}
            </button>
          )}
        </div>

        {/* Slot machine */}
        {rolling&&slotAura&&(
          <div style={{...card,textAlign:"center",padding:"22px 14px",border:`1px solid ${slotR?.color??"#818cf8"}40`,background:`${slotR?.color??"#818cf8"}08`,animation:"slotFlick .14s ease-in-out infinite"}}>
            <div style={{fontSize:"54px",marginBottom:"8px",display:"inline-block",lineHeight:1,animation:"spinIcon .28s linear infinite"}}>{slotAura.icon}</div>
            <div style={{fontFamily:th.font,fontSize:"17px",color:slotR?.color??"#818cf8",letterSpacing:"2px"}}>{slotAura.name}</div>
            <div style={{fontSize:"9px",color:th.muted,letterSpacing:"2px",marginTop:"4px"}}>{slotR?.label.toUpperCase()}</div>
          </div>
        )}

        {/* Roll button */}
        <button onClick={handleRoll} disabled={rolling} style={{padding:"17px",background:rolling?"rgba(100,100,100,.2)":th.rollBtn,border:"none",borderRadius:"10px",color:rolling?"rgba(255,255,255,.4)":"#fff",fontFamily:th.font,fontSize:"17px",fontWeight:700,letterSpacing:"5px",cursor:rolling?"not-allowed":"pointer",animation:rolling?"none":th.rollAnim,display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"}}>
          {rolling?<><span style={{display:"inline-block",animation:"spinIcon .7s linear infinite"}}>⟳</span>{isTechy?"PROCESSING...":"ROLLING..."}</>:isTechy?"> ROLL":"⚡ ROLL"}
        </button>

        {/* Auto + Shop */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
          <button onClick={()=>setAuto(a=>!a)} disabled={rolling} style={{padding:"11px",background:auto?`${th.accent}20`:"rgba(255,255,255,.03)",border:`1px solid ${auto?th.accent+"80":"rgba(255,255,255,.07)"}`,borderRadius:"8px",color:auto?th.accent:"#475569",fontFamily:th.font,fontSize:"10px",letterSpacing:"2px",cursor:"pointer"}}>
            🤖 AUTO: {auto?"ON":"OFF"}
          </button>
          <button onClick={()=>setShopOpen(s=>!s)} style={{padding:"11px",background:shopOpen?`${th.accent}18`:"rgba(255,255,255,.03)",border:`1px solid ${shopOpen?th.accent+"60":"rgba(255,255,255,.07)"}`,borderRadius:"8px",color:shopOpen?th.accent:"#475569",fontFamily:th.font,fontSize:"10px",letterSpacing:"2px",cursor:"pointer"}}>
            🛒 {isTechy?"UPGRADES":"LUCK SHOP"}
          </button>
        </div>

        {auto&&<div style={{textAlign:"center",fontSize:"10px",color:th.muted,letterSpacing:"1px",fontFamily:th.font}}>Auto-rolling every {SPEED_MS[speedLvl-1]}ms · {fmt(coins)} coins earned</div>}

        {/* Shop */}
        {shopOpen&&(
          <div style={{...card,animation:"slideDown .2s ease-out"}}>
            <div style={{fontFamily:th.font,fontSize:"9px",letterSpacing:"3px",color:th.muted,marginBottom:"12px"}}>⭐ LUCK UPGRADES</div>
            <div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"16px"}}>
              {LUCK_SHOP.map(item=>(
                <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",borderRadius:"7px",padding:"8px 11px"}}>
                  <div>
                    <div style={{fontSize:"12px",color:"#cbd5e1",fontFamily:th.font}}>{item.name}</div>
                    <div style={{fontSize:"9px",color:"#4ade80",marginTop:"1px"}}>{item.label}</div>
                  </div>
                  <button onClick={()=>buyLuck(item)} disabled={coins<item.cost} style={{background:coins>=item.cost?`${th.accent}20`:"rgba(255,255,255,.03)",border:`1px solid ${coins>=item.cost?th.accent+"60":"rgba(255,255,255,.06)"}`,borderRadius:"6px",padding:"5px 11px",color:coins>=item.cost?th.accent:"#334155",fontSize:"10px",cursor:coins<item.cost?"not-allowed":"pointer",whiteSpace:"nowrap",fontFamily:th.font}}>💰 {fmt(item.cost)}</button>
                </div>
              ))}
            </div>
            <div style={{fontFamily:th.font,fontSize:"9px",letterSpacing:"3px",color:th.muted,marginBottom:"12px"}}>⚡ SPEED UPGRADES</div>
            <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
              {SPEED_SHOP.map(item=>{
                const owned=speedLvl>=item.level;
                return(
                  <div key={item.level} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",borderRadius:"7px",padding:"8px 11px",opacity:owned?.5:1}}>
                    <div>
                      <div style={{fontSize:"12px",color:"#cbd5e1",fontFamily:th.font}}>{item.name}</div>
                      <div style={{fontSize:"9px",color:"#60a5fa",marginTop:"1px"}}>Auto interval: {item.label}</div>
                    </div>
                    <button onClick={()=>buySpeed(item)} disabled={owned||coins<item.cost} style={{background:owned?"rgba(34,197,94,.1)":coins>=item.cost?"rgba(96,165,250,.14)":"rgba(255,255,255,.03)",border:`1px solid ${owned?"rgba(34,197,94,.3)":coins>=item.cost?"rgba(96,165,250,.4)":"rgba(255,255,255,.06)"}`,borderRadius:"6px",padding:"5px 11px",color:owned?"#4ade80":coins>=item.cost?"#60a5fa":"#334155",fontSize:"10px",cursor:(owned||coins<item.cost)?"not-allowed":"pointer",whiteSpace:"nowrap",fontFamily:th.font}}>{owned?"✓ Owned":`💰 ${fmt(item.cost)}`}</button>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Redeem */}
        <div style={card}>
          <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"}}>
            <span>🔑</span>
            <span style={{fontFamily:th.font,fontSize:"9px",letterSpacing:"3px",color:th.muted}}>REDEEM CODE</span>
          </div>
          <div style={{display:"flex",gap:"7px"}}>
            <input value={codeInput} onChange={e=>setCodeInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&redeem()} placeholder={isTechy?"enter_code...":"Enter code..."} style={{flex:1,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"7px",padding:"9px 12px",color:"#e2e8f0",fontSize:"12px",fontFamily:th.font}}/>
            <button onClick={redeem} style={{padding:"9px 16px",background:`${th.accent}20`,border:`1px solid ${th.accent}60`,borderRadius:"7px",color:th.accent,fontFamily:th.font,fontSize:"10px",letterSpacing:"1px"}}>REDEEM</button>
          </div>
          <div style={{fontSize:"9px",color:th.muted,marginTop:"6px",fontFamily:th.font}}>Try: AURA2024 · LUCKYSTAR · FREEGEMS · PRIMORDIAL · UPDATE1</div>
        </div>

        {/* History */}
        <div style={card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"11px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontFamily:th.font,fontSize:"9px",letterSpacing:"3px",color:th.muted}}>ROLL HISTORY</span>
              <span style={{color:th.muted,fontSize:"10px"}}>{rolls.toLocaleString()} rolls</span>
            </div>
            <button onClick={()=>setCollOpen(true)} style={{display:"flex",alignItems:"center",gap:"5px",background:`${th.accent}14`,border:`1px solid ${th.accent}40`,borderRadius:"7px",padding:"5px 12px",color:th.accent,fontFamily:th.font,fontSize:"9px",letterSpacing:"1px",cursor:"pointer"}}>🏆 COLLECTION</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"5px",maxHeight:"220px",overflowY:"auto"}}>
            {history.length===0
              ?<div style={{color:th.muted,fontSize:"11px",letterSpacing:"2px",width:"100%",textAlign:"center",padding:"24px",fontFamily:th.font}}>{isTechy?"> awaiting input_":"Hit ROLL to begin"}</div>
              :history.map((aura,i)=><Badge key={i} aura={aura}/>)
            }
          </div>
        </div>

        {/* Rarity reference */}
        <div style={card}>
          <div style={{fontFamily:th.font,fontSize:"9px",letterSpacing:"3px",color:th.muted,marginBottom:"10px"}}>RARITY REFERENCE</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"5px"}}>
            {RK.map(k=>{
              const rc=RARITY[k];
              const w=rc.weight;
              const pct=w===0?"Code Only":w<.001?`${(w/TOTAL_W*100).toFixed(5)}%`:w<.1?`${(w/TOTAL_W*100).toFixed(3)}%`:`${(w/TOTAL_W*100).toFixed(1)}%`;
              return(
                <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 8px",background:`${rc.color}10`,border:`1px solid ${rc.color}22`,borderRadius:"5px"}}>
                  <span style={{color:rc.color,fontSize:"9px",fontFamily:th.font}}>{rc.label}</span>
                  <span style={{color:th.muted,fontSize:"7.5px"}}>{pct}</span>
                </div>
              );
            })}
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
